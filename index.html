<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstanbul Yurt Rehberi</title>
    
    <!-- Favicon (Emoji tabanlı) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet.js CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- PapaParse (CSV Çözücü) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        #map { height: 600px; width: 100%; border-radius: 1rem; z-index: 1; }
        .custom-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .custom-popup .leaflet-popup-content { margin: 0; width: 300px !important; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(229, 231, 235, 1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-[1000] py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🏠</span>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                İstanbul Yurt Rehberi
            </h1>
        </div>
        <div class="hidden md:flex space-x-6 font-medium">
            <a href="#" class="hover:text-blue-600 transition">Ana Sayfa</a>
            <a href="#" class="hover:text-blue-600 transition">Hakkımızda</a>
            <a href="#" class="hover:text-blue-600 transition">İletişim</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="max-w-7xl mx-auto px-6 py-10 text-center">
        <h2 class="text-4xl font-extrabold mb-4">Aradığınız Yurdu Haritada Keşfedin</h2>
        <p class="text-gray-600 max-w-2xl mx-auto">İstanbul'daki en popüler kız ve erkek yurtlarını güncel veriler ve konum bilgileriyle kolayca listeleyin.</p>
    </header>

    <!-- Filtreleme Butonları -->
    <section class="max-w-7xl mx-auto px-6 mb-8">
        <div class="flex flex-wrap justify-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <button onclick="filterDorms('all')" id="btn-all" class="filter-btn active px-6 py-2 rounded-full bg-blue-600 text-white font-semibold transition hover:bg-blue-700">
                Tüm Yurtlar
            </button>
            <button onclick="filterDorms('kiz')" id="btn-kiz" class="filter-btn px-6 py-2 rounded-full bg-gray-100 text-gray-700 font-semibold transition hover:bg-pink-100 hover:text-pink-600">
                🚺 Kız Yurtları
            </button>
            <button onclick="filterDorms('erkek')" id="btn-erkek" class="filter-btn px-6 py-2 rounded-full bg-gray-100 text-gray-700 font-semibold transition hover:bg-indigo-100 hover:text-indigo-600">
                🚹 Erkek Yurtları
            </button>
        </div>
    </section>

    <!-- Harita Alanı -->
    <section class="max-w-7xl mx-auto px-6 pb-20">
        <div class="relative shadow-2xl rounded-2xl overflow-hidden border-4 border-white">
            <div id="map"></div>
            <!-- Yükleniyor Göstergesi -->
            <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-70 z-[1001]">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>
        </div>
    </section>

    <footer class="bg-white border-t border-gray-200 py-8 text-center text-gray-500">
        <p>© 2024 İstanbul Yurt Rehberi - Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        // Yapılandırma
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT7bSBiaIFEoxe_LQwxrE_M80F2SQjhTOFpJiTKe6h_NV_R7FZVM-aZJwuRwxqiTf8_8u2nIS1SMMcm/pub?output=csv';
        let map, markerLayer;
        let allDorms = [];

        // Haritayı Başlat
        function initMap() {
            map = L.map('map').setView([41.0082, 28.9784], 11); // İstanbul Merkezi
            
           L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            markerLayer = L.layerGroup().addTo(map);
        }

        // CSV Verisini Çek
        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    allDorms = results.data.filter(d => d.Enlem && d.Boylam);
                    renderMarkers(allDorms);
                    document.getElementById('loader').style.display = 'none';
                },
                error: function(err) {
                    console.error("Veri çekilirken hata oluştu:", err);
                    alert("Veriler yüklenemedi!");
                }
            });
        }

        // Haritaya İşaretçileri Ekle
        function renderMarkers(data) {
            markerLayer.clearLayers();

            data.forEach(item => {
                const lat = parseFloat(item.Enlem);
                const lng = parseFloat(item.Boylam);

                if (!isNaN(lat) && !isNaN(lng)) {
                    const popupContent = `
                        <div class="custom-popup">
                            <img src="${item.Gorsel_URL}" class="w-full h-40 object-cover" alt="${item.Yurt_Adi}">
                            <div class="p-4">
                                <h3 class="font-bold text-lg mb-1">${item.Yurt_Adi}</h3>
                                <p class="text-gray-600 text-xs mb-3"><span class="font-semibold">📍 Adres:</span> ${item.Adres}</p>
                                <div class="relative pt-[56.25%] overflow-hidden rounded-lg shadow-inner bg-black">
                                    <iframe 
                                        class="absolute top-0 left-0 w-full h-full" 
                                        src="${item.Video_URL}" 
                                        frameborder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowfullscreen>
                                    </iframe>
                                </div>
                            </div>
                        </div>
                    `;

                    const marker = L.marker([lat, lng]).bindPopup(popupContent);
                    markerLayer.addLayer(marker);
                }
            });

            // Haritayı işaretçilere göre odakla (isteğe bağlı)
            if (data.length > 0) {
                const group = new L.featureGroup(markerLayer.getLayers());
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Filtreleme Fonksiyonu
        function filterDorms(type) {
            let filtered;
            const btns = document.querySelectorAll('.filter-btn');
            
            // Buton Tasarımlarını Güncelle
            btns.forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'bg-pink-500', 'bg-indigo-600');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });

            if (type === 'all') {
                filtered = allDorms;
                document.getElementById('btn-all').className = 'filter-btn px-6 py-2 rounded-full bg-blue-600 text-white font-semibold transition';
            } else if (type === 'kiz') {
                filtered = allDorms.filter(d => d.Yurt_Adi.toLocaleLowerCase('tr-TR').includes('kız'));
                document.getElementById('btn-kiz').className = 'filter-btn px-6 py-2 rounded-full bg-pink-500 text-white font-semibold transition';
            } else if (type === 'erkek') {
                filtered = allDorms.filter(d => d.Yurt_Adi.toLocaleLowerCase('tr-TR').includes('erkek'));
                document.getElementById('btn-erkek').className = 'filter-btn px-6 py-2 rounded-full bg-indigo-600 text-white font-semibold transition';
            }

            renderMarkers(filtered);
        }

        // Başlat
        window.onload = () => {
            initMap();
            fetchData();
        };
    </script>
</body>
</html>
