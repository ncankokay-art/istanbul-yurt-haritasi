<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstanbul Öğrenci Yurdu Rehberi</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- PapaParse (CSV İşleme için) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        #map { height: 100vh; width: 100%; }
        .hidden { display: none; }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .popup-card img { width: 100%; border-radius: 8px; margin-top: 8px; height: 150px; object-fit: cover; }
        .popup-card iframe { width: 100%; border-radius: 8px; margin-top: 8px; height: 150px; }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">

    <!-- AÇILIŞ SAYFASI (LANDING PAGE) -->
    <div id="landing-page" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-gradient-to-br from-blue-700 to-indigo-900 text-white text-center p-6 transition-all duration-700">
        <div class="max-w-3xl">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 drop-shadow-lg">İstanbul Öğrenci Yurdu Rehberi</h1>
            <p class="text-xl md:text-2xl mb-10 text-blue-100 leading-relaxed">
                İstanbul'daki en iyi yurtları keşfedin. Adres, görsel ve tanıtım videolarına tek tıkla ulaşın.
            </p>
            <button id="start-btn" class="bg-white text-blue-700 px-10 py-4 rounded-full text-xl font-bold hover:bg-blue-50 transform hover:scale-105 transition-all shadow-2xl">
                Haritayı Keşfet
            </button>
        </div>
        <div class="mt-20 opacity-50 text-sm italic">
            *Veriler gerçek zamanlı olarak Google Sheets üzerinden çekilmektedir.
        </div>
    </div>

    <!-- HARİTA EKRANI -->
    <div id="map-container" class="relative w-full h-screen">
        <!-- Loader (Veriler yüklenirken görünecek) -->
        <div id="loader" class="absolute top-5 right-5 z-[1000] bg-white px-4 py-2 rounded-lg shadow-lg hidden flex items-center">
            <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-700 mr-3"></div>
            <span class="text-sm font-medium text-gray-700">Yurtlar haritaya ekleniyor...</span>
        </div>
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT7bSBiaIFEoxe_LQwxrE_M80F2SQjhTOFpJiTKe6h_NV_R7FZVM-aZJwuRwxqiTf8_8u2nIS1SMMcm/pub?output=csv';
        let map;

        // Sayfa geçiş animasyonu
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('landing-page').classList.add('opacity-0', 'pointer-events-none');
            initMap();
            loadData();
        });

        // Haritayı başlat
        function initMap() {
            map = L.map('map').setView([41.0082, 28.9784], 11); // İstanbul merkezli
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        }

        // YouTube URL'sini Embed koduna çevirir
        function getYoutubeEmbed(url) {
            if (!url) return '';
            let videoId = '';
            if (url.includes('v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : url;
        }

        // Nominatim API ile adresi koordinata çevir (Geocoding)
        async function getCoordinates(address) {
            try {
                // Nominatim isteği (İstanbul aramasıyla sınırlandırıldı)
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ' Istanbul')}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    return { lat: data[0].lat, lon: data[0].lon };
                }
            } catch (error) {
                console.error('Geocoding hatası:', error);
            }
            return null;
        }

        // Verileri çek ve haritaya ekle
        function loadData() {
            document.getElementById('loader').classList.remove('hidden');

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: async function(results) {
                    const yurtlar = results.data;

                    for (const yurt of yurtlar) {
                        // Eğer isim veya adres yoksa atla
                        if (!yurt.Yurt_Adi || !yurt.Adres) continue;

                        const coords = await getCoordinates(yurt.Adres);
                        
                        if (coords) {
                            const videoEmbed = getYoutubeEmbed(yurt.Video_URL);
                            
                            const popupContent = `
                                <div class="popup-card p-2 min-w-[250px]">
                                    <h3 class="font-bold text-lg text-blue-800 leading-tight">${yurt.Yurt_Adi}</h3>
                                    <p class="text-xs text-gray-500 font-semibold mt-1 uppercase">${yurt.Ilce}</p>
                                    <p class="text-sm text-gray-700 mt-2">${yurt.Adres}</p>
                                    
                                    ${yurt.Gorsel_URL ? `<img src="${yurt.Gorsel_URL}" alt="${yurt.Yurt_Adi}">` : ''}
                                    
                                    ${videoEmbed ? `
                                        <iframe src="${videoEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                    ` : ''}
                                </div>
                            `;

                            L.marker([coords.lat, coords.lon])
                                .addTo(map)
                                .bindPopup(popupContent);
                        }
                        
                        // Nominatim API'yi yormamak ve rate limit'e takılmamak için kısa bir bekleme (0.5 sn)
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                    document.getElementById('loader').classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
